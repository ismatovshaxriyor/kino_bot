# KinoBot — to'liq Docker tarkibi (Redis + Postgres + bot + worker).
#
# Lokal ishlab chiqish:
#   docker compose up -d                          -> faqat redis + db
#   (bot/worker'ni host'da `python main.py` / `python worker.py` bilan ishlating)
#
# Production (EC2):
#   docker compose --profile app up -d --build    -> hammasi (4 ta konteyner)
#
# bot/worker "app" profilida — profil ko'rsatilmasa ishga tushmaydi, shu sababli
# bitta fayl ham lokal dev, ham production uchun ishlaydi.
#
# Redis/Postgres portlari faqat 127.0.0.1 ga ochilgan: internetdan yopiq,
# lekin host'dan (yoki SSH tunnel orqali) psql/redis-cli bilan kirish mumkin.

services:
  redis:
    image: redis:alpine
    container_name: my_bot_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  db:
    image: postgres:15-alpine
    container_name: my_bot_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:${DB_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    image: kino_bot:latest
    container_name: my_bot_app
    profiles: ["app"]
    restart: always
    command: python main.py
    env_file: .env
    environment:
      # Konteyner ichidan infra compose tarmog'i orqali ko'rinadi —
      # .env'dagi DB_HOST/REDIS_URL qiymatlarini bekor qiladi.
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis
    volumes:
      # aerich migratsiyalari host'da saqlanib qolishi uchun (.gitignore'da)
      - ./migrations:/app/migrations
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    image: kino_bot:latest
    container_name: my_bot_worker
    profiles: ["app"]
    restart: always
    command: python worker.py
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  pg_data:
